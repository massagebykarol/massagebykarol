<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Under Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Website currently under maintenance. Contact us via WhatsApp for bookings.">
  <meta name="robots" content="noindex, nofollow">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 20px;
      animation: fadeIn 1.2s ease-in-out;
    }
    img {
      width: 120px;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
    }
    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      padding: 15px 25px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      border-radius: 8px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #1ebe5d;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://i.ibb.co/sJ5qcmF6/IMG-0400.jpg" alt="Logo">
    <h1>Website Under Maintenance</h1>
    <p>
      My website is currently under maintenance.<br>
      We'll be back shortly.<br><br>
      All bookings and information are available via WhatsApp.
    </p>
    <a class="btn" 
       href="https://wa.me/447367459488?text=Hello%2C%20I%20would%20like%20to%20make%20a%20booking" 
       target="_blank">
      Contact on WhatsApp
    </a>
  </div>
</body>
</html>
